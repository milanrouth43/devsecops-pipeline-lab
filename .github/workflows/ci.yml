name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-scan:
    name: Build and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # continue-on-error: true  

      - name: Run Semgrep SAST
        run: |
          python -m pip install semgrep
          semgrep scan --config auto
        # continue-on-error: true  

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      # NEW STEP 5: Build the Docker Image
      - name: Build Docker Image
        run: docker build -t my-dummy-app:latest .

      # NEW STEP 6: Scan the Docker Image
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-dummy-app:latest'
          format: 'table'
          exit-code: '0' # Still set to 0 so it doesn't fail the pipeline yet!
      # NEW STEP 7: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # NEW STEP 8: Tag and Push the Image
      - name: Push Image to Docker Hub
        run: |
          docker tag my-dummy-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/my-dummy-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-dummy-app:latest
